name: Compress game data & generate OG images

on:
  push:
    branches: [main]
    paths: ['**.json', 'files/**/cover.jpg', 'files/**/cover.png', 'scripts/**']
  workflow_dispatch:

jobs:
  compress:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Sync compressed game JSON files
        run: |
          # Delete all existing .gz files, then regenerate from current .json files.
          # --no-name zeros the timestamp so output is deterministic:
          # unchanged files produce byte-identical .gz → git sees no diff → no bot commit.
          find . -name "*.json.gz" -delete
          find . -name "*.json" -not -name "*.schema.json" \
            -exec gzip --best --no-name --keep {} \;

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate OG images
        run: |
          pip install Pillow
          python3 scripts/generate_og_images.py

      - name: Auto-stamp added_date on new registry entries
        run: |
          python3 -c "
          import json, datetime, sys

          path = 'registry.json'
          with open(path, 'r', encoding='utf-8') as f:
              data = json.load(f)

          today = datetime.date.today().isoformat()
          changed = False
          for game in data.get('games', []):
              if 'added_date' not in game:
                  game['added_date'] = today
                  changed = True

          if changed:
              with open(path, 'w', encoding='utf-8') as f:
                  json.dump(data, f, indent=4, ensure_ascii=False)
                  f.write('\n')
              print(f'Stamped added_date={today} on new entries')
          else:
              print('All entries already have added_date')
          "

      - name: Commit if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all '*.json.gz' '*.png' 'registry.json'
          git diff --cached --quiet || git commit -m "chore: sync compressed JSON & OG images [skip ci]"
          git push
